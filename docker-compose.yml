services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data/faiss_index:/app/data/faiss_index
      - ./data/eval_dataset.json:/app/data/eval_dataset.json
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped